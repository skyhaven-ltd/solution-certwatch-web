name: "Terraform"

on:
  push:
    branches:
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: prd
        options:
          - dev
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  # Plan, apply, or destroy Terraform infrastructure
  terraform:
    name: "Terraform ${{ inputs.terraform_action || 'plan' }} (${{ inputs.env || 'prd' }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'prd' }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_entra_client_secret: ${{ secrets.ENTRA_CLIENT_SECRET }}
      TF_VAR_brevo_api_key: ${{ secrets.BREVO_API_KEY }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.9.8

      - name: "Ensure State Container"
        uses: ./.github/actions/ensure-tfstate-container
        with:
          storage_account_name: sttfsplatform${{ inputs.env || 'prd' }}uks01
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Terraform Init"
        env:
          TF_ENV: ${{ inputs.env || 'prd' }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=rg-tfs-platform-$TF_ENV-uks-01" \
            -backend-config="storage_account_name=sttfsplatform${TF_ENV}uks01" \
            -backend-config="container_name=$REPO_NAME" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="subscription_id=${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}"

      - name: "Remove Migrated Azure DNS Records From State"
        run: |
          set -euo pipefail

          for address in \
            "azurerm_dns_a_record.swa" \
            "azurerm_dns_txt_record.swa"
          do
            if terraform -chdir=infra state list | grep -Fxq "$address"; then
              terraform -chdir=infra state rm "$address"
            fi
          done

      - name: "Terraform Plan"
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == ''
        env:
          TF_ENV: ${{ inputs.env || 'prd' }}
        run: |
          terraform -chdir=infra plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Terraform Apply"
        if: inputs.terraform_action == 'apply'
        env:
          TF_ENV: ${{ inputs.env || 'prd' }}
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Terraform Destroy"
        if: inputs.terraform_action == 'destroy'
        env:
          TF_ENV: ${{ inputs.env || 'prd' }}
        run: |
          terraform -chdir=infra destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/$TF_ENV.tfvars"

      - name: "Break State Lease"
        if: always()
        uses: ./.github/actions/break-tfstate-lease
        with:
          storage_account_name: sttfsplatform${{ inputs.env || 'prd' }}uks01
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}
